<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Manajemen — Rumah Sehat Dani Sabri</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">
    
    <!-- Animasi Background Pasif -->
    <div class="bg-blobs">
        <div class="blob-1"></div>
        <div class="blob-2"></div>
    </div>

    <!-- ── MODUL LOGIN ── -->
    <div id="loginScreen" class="login-wrapper">
        <div class="login-luxury-card">
            <div class="login-header">
                <div class="login-logo">
                    <i class="fas fa-shield-halved"></i>
                </div>
                <h2>Akses Manajemen</h2>
                <p>Rumah Sehat Dani Sabri</p>
            </div>
            <form id="formLogin" onsubmit="event.preventDefault(); doLogin();" class="login-form">
                <div class="pin-input-group">
                    <input type="password" id="adminPin" maxlength="8" placeholder="••••" required autofocus>
                    <small>Masukkan PIN Keamanan</small>
                </div>
                <button type="submit" id="btnLogin" class="btn-primary-luxury">
                    <span>Masuk ke Sistem</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
                <div id="loginAlert" class="error-toast" style="display: none;"></div>
            </form>
        </div>
    </div>

    <!-- ── MODUL DESBOR UTAMA ── -->
    <div id="dashboardScreen" class="dashboard-layout" style="display: none;">
        
        <!-- Sidebar Navigation (Desktop) -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <i class="fas fa-hand-holding-medical"></i>
                <span>RS Dani Sabri</span>
            </div>
            <nav class="sidebar-menu">
                <button id="tabBooking" class="nav-item active" onclick="switchTab('booking')">
                    <i class="fas fa-calendar-alt"></i>
                    <span>Reservasi</span>
                </button>
                <button id="tabLaporan" class="nav-item" onclick="switchTab('laporan')">
                    <i class="fas fa-analytics"></i>
                    <span>Laporan</span>
                </button>
            </nav>
            <div class="sidebar-footer">
                <button onclick="logout()" class="btn-logout-minimal">
                    <i class="fas fa-power-off"></i>
                    <span>Keluar</span>
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            
            <header class="topbar">
                <div class="topbar-left">
                    <h1 id="pageTitle">Manajemen Reservasi</h1>
                    <p id="pageSubtitle">Pantau dan kelola jadwal pasien hari ini.</p>
                </div>
                <div class="topbar-right">
                    <div class="admin-status">
                        <span class="status-indicator online"></span>
                        <span>Administrator</span>
                    </div>
                </div>
            </header>

            <div class="content-body">
                
                <!-- Konten: Booking & Reservasi -->
                <div id="tabContentBooking" class="tab-pane">
                    
                    <div class="action-bar-luxury">
                        <div class="filter-pills">
                            <button class="pill active" onclick="applyFilter('semua')">Semua</button>
                            <button class="pill" onclick="applyFilter('terjadwal')">Terjadwal</button>
                            <button class="pill" onclick="applyFilter('hariini')">Hari Ini</button>
                        </div>
                        <div class="search-box-luxury">
                            <i class="fas fa-search"></i>
                            <input type="text" id="searchPasien" placeholder="Cari nama atau nomor HP..." oninput="handleSearch(this.value)">
                        </div>
                    </div>

                    <div id="loadingDash" class="skeleton-loader" style="display: none;">
                        <div class="sk-card"></div>
                        <div class="sk-card"></div>
                    </div>
                    
                    <div id="listPasien" class="data-grid"></div>
                </div>

                <!-- Konten: Laporan -->
                <div id="tabContentLaporan" class="tab-pane" style="display:none;">
                    <div id="loadingLaporan" class="skeleton-loader" style="display: none;">
                        <div class="sk-grid"></div>
                    </div>
                    <div id="isiLaporan"></div>
                </div>

            </div>
        </main>

        <!-- Bottom Navigation (Mobile Only) -->
        <nav class="bottom-nav">
            <button class="bn-item active" onclick="switchTab('booking')">
                <i class="fas fa-calendar-alt"></i>
                <span>Booking</span>
            </button>
            <button class="bn-item" onclick="switchTab('laporan')">
                <i class="fas fa-chart-pie"></i>
                <span>Laporan</span>
            </button>
            <button class="bn-item" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
                <span>Keluar</span>
            </button>
        </nav>

    </div>

    <!-- Scripts -->
    <script src="config.js"></script>
    <script src="admin.js"></script>
</body>
</html>
