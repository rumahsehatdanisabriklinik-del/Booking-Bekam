name: Frontend smoke tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run smoke tests
        run: npm test

      - name: Check production deployment
        if: ${{ github.event_name == 'push' && env.PRODUCTION_URL != '' }}
        run: |
          curl --fail --silent --show-error --location "$PRODUCTION_URL" > /tmp/home.html
          grep -qi "Rumah Sehat" /tmp/home.html
