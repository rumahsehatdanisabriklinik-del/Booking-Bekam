<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Status Booking — Rumah Sehat Dani Sabri</title>

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            safelist: [
                'bg-slate-50', 'text-slate-600', 'border-slate-200',
                'bg-blue-50', 'text-blue-600', 'border-blue-200',
                'bg-red-50', 'text-red-600', 'border-red-200',
                'bg-emerald-50', 'text-emerald-600', 'border-emerald-200', 'bg-emerald-100',
                'bg-red-100'
            ],
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        emerald: {
                            50: '#ecfdf5',
                            100: '#d1fae5',
                            200: '#a7f3d0',
                            300: '#6ee7b7',
                            400: '#34d399',
                            500: '#10b981',
                            600: '#059669',
                            700: '#047857',
                            800: '#065f46',
                            900: '#064e3b',
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">
    
    <style type="text/tailwindcss">
        @layer components {
            .status-card {
                @apply bg-white/90 backdrop-blur-md border border-white/80 p-5 rounded-2xl shadow-lg shadow-emerald-900/5 flex flex-col gap-3 transition-all duration-300 animate-slide-up hover:-translate-y-1 hover:shadow-xl hover:shadow-emerald-900/10;
            }
            .status-badge {
                @apply px-3.5 py-1.5 rounded-full text-xs font-extrabold uppercase tracking-widest;
            }
            .badge-terjadwal { @apply bg-blue-50 text-blue-600 border border-blue-200; }
            .badge-batal { @apply bg-red-50 text-red-600 border border-red-200; }
            .badge-selesai { @apply bg-emerald-50 text-emerald-600 border border-emerald-200; }
            .badge-lainnya { @apply bg-slate-50 text-slate-600 border border-slate-200; }
            
            .btn-cancel {
                @apply w-full flex justify-center items-center gap-2 bg-white border-2 border-red-200 text-red-600 py-2.5 px-4 rounded-xl font-bold cursor-pointer transition-all hover:bg-red-50 hover:border-red-600 hover:scale-[1.02] mt-2;
            }
        }
    </style>
</head>
<body class="bg-sky-50 min-h-screen text-slate-800 antialiased overflow-x-hidden relative flex flex-col items-center p-4 md:p-10">
    <div class="bg-blobs">
        <div class="blob-1"></div>
        <div class="blob-2"></div>
        <div class="blob-3"></div>
    </div>

    <!-- Header Nav -->
    <div class="w-full max-w-2xl text-center py-6 relative z-10">
        <a href="booking.html" class="inline-flex items-center gap-2 bg-white/90 backdrop-blur-sm text-emerald-700 border-2 border-emerald-500 py-2.5 px-6 rounded-full font-bold shadow-md hover:bg-emerald-50 transition-colors">
            <i class="fas fa-arrow-left"></i> Kembali ke Form Booking
        </a>
    </div>

    <div class="text-center mb-8 relative z-10 w-full max-w-2xl px-4">
        <div class="inline-flex items-center gap-2 bg-white/80 backdrop-blur-sm px-4 py-2 rounded-full text-emerald-700 text-xs font-bold uppercase tracking-widest shadow-md mb-6 border border-white/40">
            <i class="fas fa-search text-emerald-500"></i> Lacak Jadwal
        </div>
        <h1 class="text-3xl md:text-5xl font-extrabold text-emerald-950 leading-tight mb-3">Status Reservasi</h1>
        <p class="text-slate-600 font-medium text-lg">Cek atau batalkan jadwal Anda menggunakan Nomor HP</p>
    </div>

    <div class="w-full max-w-[540px] relative z-10 glass-panel rounded-[2rem] shadow-2xl overflow-hidden shadow-emerald-900/5 mb-10">
        <div class="p-6 md:p-10">
            <form id="trackForm" onsubmit="event.preventDefault(); trackBooking();" class="space-y-6">
                <div class="space-y-2">
                    <label for="noHpTrack" class="block text-slate-800 text-sm font-bold pl-1">No. HP / WhatsApp yang didaftarkan</label>
                    <div class="relative">
                        <i class="fab fa-whatsapp absolute left-4 top-1/2 -translate-y-1/2 text-emerald-600 z-10 text-lg"></i>
                        <input type="tel" id="noHpTrack" class="w-full bg-white border-2 border-slate-200 text-slate-800 font-medium text-sm rounded-xl py-3.5 pr-4 pl-12 transition-all focus:outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 shadow-sm block" placeholder="Contoh: 081234567890" required inputmode="numeric" pattern="[0-9]*">
                    </div>
                </div>
                <button type="submit" id="btnTrack" class="w-full py-4 bg-gradient-to-r from-emerald-600 to-teal-500 text-white font-extrabold text-base rounded-2xl shadow-xl shadow-emerald-500/30 flex items-center justify-center gap-2 hover:-translate-y-1 hover:shadow-2xl hover:shadow-emerald-500/40 transition-all duration-300 disabled:opacity-60 disabled:hover:translate-y-0 disabled:shadow-none disabled:cursor-not-allowed">
                    <i class="fas fa-search"></i>
                    <span id="btnTrackText">Cari Jadwal</span>
                </button>
            </form>

            <div id="resultContainer" class="hidden mt-10 animate-slide-in">
                <div class="flex items-center justify-center gap-3 mb-6 p-4 bg-emerald-50 border border-emerald-100 rounded-2xl">
                    <i class="fas fa-clipboard-list text-emerald-600 text-2xl"></i>
                    <h3 class="text-emerald-800 text-lg font-extrabold m-0">Riwayat Jadwal Anda</h3>
                </div>
                <div class="flex flex-col gap-5" id="ticketList">
                    <!-- Dinamis injeksi dari status.js -->
            </div>
            <div id="alertBoxStatus" class="hidden mt-6 p-4 rounded-xl text-sm font-bold text-center border animate-slide-in"></div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="status.js"></script>
</body>
</html>
