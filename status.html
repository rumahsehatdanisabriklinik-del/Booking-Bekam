<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Status Booking — Rumah Sehat Dani Sabri</title>

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    
    <style>
        .ticket-list { margin-top: 25px; display: flex; flex-direction: column; gap: 18px; }
        
        @keyframes slideUpIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        .status-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            padding: 22px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(6, 78, 59, 0.05);
            display: flex; flex-direction: column; gap: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: slideUpIn 0.5s ease-out forwards;
        }
        
        .status-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(6, 78, 59, 0.08); }
        
        .status-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px dashed rgba(6, 78, 59, 0.1); padding-bottom: 15px; }
        
        .status-badge { padding: 6px 14px; border-radius: 30px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .badge-terjadwal { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
        .badge-batal { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
        .badge-selesai { background: #ecfdf5; color: #059669; border: 1px solid #a7f3d0; }
        .badge-lainnya { background: #f3f4f6; color: #4b5563; border: 1px solid #e5e7eb; }

        .btn-cancel {
            background: white; border: 2px solid #fecaca; color: #dc2626;
            padding: 10px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: all 0.3s;
            margin-top: 8px; width: 100%; display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .btn-cancel:hover { background: #fff5f5; border-color: #dc2626; transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="bg-blobs">
        <div class="blob-1"></div>
        <div class="blob-2"></div>
        <div class="blob-3"></div>
    </div>

    <!-- Header Nav -->
    <div style="padding: 20px; text-align: center; position: relative; z-index: 2;">
        <a href="index.html" class="btn-cancel" style="display: inline-flex; width: auto; background: rgba(255,255,255,0.9); color: var(--emerald-700); border: 2px solid var(--emerald-500); padding: 10px 24px; border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);"><i class="fas fa-arrow-left"></i> Kembali ke Form Booking</a>
    </div>

    <div class="hero" style="padding-top: 20px;">
        <div class="hero-badge"><i class="fas fa-search"></i> Lacak Jadwal</div>
        <h1>Status Reservasi</h1>
        <p>Cek atau batalkan jadwal Anda menggunakan Nomor HP</p>
    </div>

    <div class="card">
        <div class="card-body">
            <form id="trackForm" onsubmit="event.preventDefault(); trackBooking();">
                <div class="form-group">
                    <label for="noHpTrack">No. HP / WhatsApp yang didaftarkan</label>
                    <div class="input-wrap">
                        <i class="fab fa-whatsapp icon"></i>
                        <input type="tel" id="noHpTrack" class="form-control" placeholder="Contoh: 081234567890" required inputmode="numeric" pattern="[0-9]*">
                    </div>
                </div>
                <button type="submit" id="btnTrack" class="btn-submit">
                    <i class="fas fa-search"></i>
                    <span class="btn-text" id="btnTrackText">Cari Jadwal</span>
                </button>
            </form>

            <div id="resultContainer" style="display: none; margin-top: 35px;">
                <div style="display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom: 20px;">
                    <i class="fas fa-clipboard-list" style="color: var(--emerald-600); font-size: 1.5rem;"></i>
                    <h3 style="color: var(--emerald-800); text-align: center; margin: 0;">Riwayat Jadwal Anda</h3>
                </div>
                <div class="ticket-list" id="ticketList">
                    <!-- Dinamis injeksi dari status.js -->
                </div>
            </div>
            
            <div id="alertBoxStatus" class="alert" style="display: none;"></div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="status.js"></script>
</body>
</html>
