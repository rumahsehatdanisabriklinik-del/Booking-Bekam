<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Bekam — Rumah Sehat Dani Sabri</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Background Decoration -->
    <div class="bg-blobs">
        <div class="blob-1"></div>
        <div class="blob-2"></div>
        <div class="blob-3"></div>
    </div>

    <!-- ── HERO ── -->
    <div class="hero">
        <div class="hero-badge"><i class="fas fa-circle-check"></i> Sistem Reservasi Online</div>
        <h1>Rumah Sehat<br><span>Dani Sabri</span></h1>
        <p>Bekam, Ruqyah &amp; Terapi Islami Profesional</p>
    </div>

    <!-- ── CARD ── -->
    <div class="card">
        <!-- Progress Bar Indicator -->
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="card-topbar">
            <div class="card-topbar-icon">
                <i class="fas fa-calendar-plus"></i>
            </div>
            <div class="card-topbar-text">
                <h2>Form Booking Jadwal</h2>
                <p>Isi data di bawah untuk membuat reservasi</p>
            </div>
        </div>

        <div class="card-body">
            <!-- Loader Awal -->
            <div id="global-loader">
                <div class="mini-spinner"></div>
                <span>Menghubungkan ke sistem klinik...</span>
            </div>

            <form id="bookingForm" onsubmit="event.preventDefault(); submitBooking();" novalidate>

                <!-- STEP 1: Data Klien -->
                <div class="step-label">
                    <div class="step-num">1</div>
                    <span>Data Klien</span>
                    <div class="step-divider"></div>
                </div>

                <div class="form-group">
                    <label>Jenis Kelamin Klien</label>
                    <div class="gender-pills">
                        <div class="gender-pill">
                            <input type="radio" id="jkL" name="jenisKelamin" value="Laki-laki" disabled onchange="filterTerapis()">
                            <label for="jkL"><i class="fas fa-mars"></i> Laki-laki</label>
                        </div>
                        <div class="gender-pill">
                            <input type="radio" id="jkP" name="jenisKelamin" value="Perempuan" disabled onchange="filterTerapis()">
                            <label for="jkP"><i class="fas fa-venus"></i> Perempuan</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="nama">Nama Lengkap</label>
                    <div class="input-wrap">
                        <i class="fas fa-user icon"></i>
                        <input type="text" id="nama" class="form-control" placeholder="Contoh: Ahmad Fauzi" required autocomplete="name">
                    </div>
                </div>

                <div class="form-group">
                    <label for="nohp">No. HP / WhatsApp</label>
                    <div class="input-wrap">
                        <i class="fab fa-whatsapp icon"></i>
                        <input type="tel" id="nohp" class="form-control" placeholder="Contoh: 081234567890" required pattern="^[0-9+]+" minlength="9" autocomplete="tel">
                    </div>
                </div>

                <!-- STEP 2: Pilih Jadwal -->
                <div class="step-label">
                    <div class="step-num">2</div>
                    <span>Pilih Jadwal</span>
                    <div class="step-divider"></div>
                </div>

                <div class="form-group">
                    <label for="terapis">Terapis</label>
                    <div class="input-wrap select-wrap">
                        <i class="fas fa-user-md icon"></i>
                        <select id="terapis" class="form-control" required disabled onchange="checkAvailability()">
                            <option value="" disabled selected>Pilih jenis kelamin terlebih dahulu</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="tanggal">Tanggal Reservasi</label>
                    <div class="input-wrap">
                        <i class="fas fa-calendar icon"></i>
                        <input type="date" id="tanggal" class="form-control" required onchange="checkAvailability()">
                    </div>
                </div>

                <div class="form-group">
                    <label for="waktu">Slot Waktu Tersedia</label>
                    <div class="input-wrap select-wrap">
                        <i class="fas fa-clock icon"></i>
                        <select id="waktu" class="form-control" required disabled>
                            <option value="" disabled selected>Pilih terapis dan tanggal dulu</option>
                        </select>
                    </div>
                </div>

                <!-- STEP 3: Pilih Layanan -->
                <div class="step-label">
                    <div class="step-num">3</div>
                    <span>Pilih Layanan</span>
                    <div class="step-divider"></div>
                </div>

                <div class="form-group">
                    <label for="sesiBekam">Jenis Sesi / Paket</label>
                    <div class="input-wrap select-wrap">
                        <i class="fas fa-briefcase-medical icon"></i>
                        <select id="sesiBekam" class="form-control" required disabled>
                            <option value="" disabled selected>Memuat layanan klinik...</option>
                        </select>
                    </div>
                </div>

                <button type="submit" id="btnSubmit" class="btn-submit" disabled>
                    <i class="fas fa-check-circle"></i>
                    <span class="btn-text">Konfirmasi Booking</span>
                    <div class="spinner" id="btnSpinner"></div>
                </button>

                <div id="alertBox" class="alert"></div>

            </form>
        </div>
    </div>

    <p class="footer-note">
        <i class="fas fa-shield-halved"></i> Data Anda aman &amp; hanya digunakan untuk keperluan reservasi
    </p>

    <!-- Logika Aplikasi -->
    <script src="app.js"></script>

</body>
</html>
